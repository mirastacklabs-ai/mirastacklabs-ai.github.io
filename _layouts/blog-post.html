---
layout: default
---
<section class="section blog-post">
  <div class="container blog-post__container">
    <div class="blog-post__meta-bar">
      {% if page.date %}
      <span class="blog-post__meta-tag label">{{ page.date | date: "%B %-d, %Y" }}</span>
      {% endif %}
      {% if page.categories and page.categories.size > 0 %}
      <span class="blog-post__meta-tag label">Category: {{ page.categories[0] }}</span>
      {% endif %}
      <span class="blog-post__meta-tag label">Role: Engineer</span>
    </div>
    
    <article class="blog-prose">
      {{ content }}
    </article>
  </div>
</section>

<script src="{{ '/assets/js/vendor/mermaid.min.js' | relative_url }}"></script>
<script>
  const html = document.documentElement;
  const mermaid = window.mermaid;

  if (!mermaid) {
    console.error("Mermaid failed to load from local asset.");
  }

  function cssVar(name) {
    return getComputedStyle(html).getPropertyValue(name).trim();
  }

  function buildThemeVariables() {
    const isMobile = window.matchMedia("(max-width: 900px)").matches;
    return {
      fontFamily: "'JetBrains Mono', 'Courier New', monospace",
      fontSize: isMobile ? "11px" : "13px",
      primaryColor: cssVar("--bg-alt"),
      primaryTextColor: cssVar("--text"),
      primaryBorderColor: cssVar("--border-accent"),
      lineColor: cssVar("--accent"),
      secondaryColor: cssVar("--bg-card"),
      tertiaryColor: cssVar("--bg"),
      background: cssVar("--bg"),
      mainBkg: cssVar("--bg-alt"),
      nodeBorder: cssVar("--border-accent"),
      clusterBkg: cssVar("--bg"),
      clusterBorder: cssVar("--border-accent"),
      defaultLinkColor: cssVar("--accent"),
      edgeLabelBackground: cssVar("--bg-card"),
      noteBkgColor: cssVar("--bg-card"),
      noteTextColor: cssVar("--text"),
      tertiaryTextColor: cssVar("--text-muted")
    };
  }

  function normalizeLanguage(raw) {
    if (!raw) return "text";
    const lang = raw.toLowerCase();
    if (lang === "shell-session" || lang === "terminal" || lang === "console") return "shell";
    if (lang === "plaintext") return "text";
    if (lang === "zsh") return "bash";
    return lang;
  }

  function looksLikeShell(content) {
    const sample = content.trim();
    if (!sample) return false;
    return /(^|\n)\s*(\$\s+|sudo\s+|curl\s+|docker\s+|kubectl\s+|npm\s+|yarn\s+|pnpm\s+|bundle\s+)/.test(sample);
  }

  function setCodeLanguageBadges() {
    const blocks = document.querySelectorAll("article.blog-prose pre > code");
    blocks.forEach((code) => {
      const pre = code.parentElement;
      if (!pre) return;
      const languageClass =
        Array.from(code.classList).find((c) => c.startsWith("language-")) ||
        Array.from(pre.classList).find((c) => c.startsWith("language-")) ||
        Array.from((pre.parentElement && pre.parentElement.classList) || []).find((c) => c.startsWith("language-")) ||
        Array.from((pre.closest("[class*='language-']")?.classList) || []).find((c) => c.startsWith("language-"));

      let lang = normalizeLanguage(languageClass ? languageClass.replace("language-", "") : "text");
      if (lang === "text" && looksLikeShell(code.textContent)) {
        lang = "bash";
      }
      pre.dataset.lang = lang;
    });
  }

  function enforceNewTabLinks() {
    const links = document.querySelectorAll("article.blog-prose a[href]");
    links.forEach((link) => {
      const href = link.getAttribute("href") || "";
      if (href.startsWith("#")) return;
      link.setAttribute("target", "_blank");
      link.setAttribute("rel", "noopener noreferrer");
    });
  }

  function addLineNumbers() {
    const blocks = document.querySelectorAll("article.blog-prose pre > code");

    blocks.forEach((code) => {
      const pre = code.parentElement;
      if (!pre || pre.dataset.lang === "mermaid" || code.classList.contains("has-line-numbers")) {
        return;
      }

      const htmlSource = code.innerHTML.replace(/\n$/, "");
      const lines = htmlSource.split("\n");
      const wrapped = lines
        .map((line) => `<span class=\"code-line\">${line.length ? line : " "}</span>`)
        .join("");

      code.innerHTML = wrapped;
      code.classList.add("has-line-numbers");
    });
  }

  function hydrateMermaidBlocks() {
    const codeBlocks = document.querySelectorAll("pre > code.language-mermaid");

    codeBlocks.forEach((code) => {
      const pre = code.parentElement;
      if (!pre) return;

      const container = document.createElement("div");
      container.className = "mermaid";
      container.dataset.lang = "mermaid";
      container.dataset.mermaidSource = code.textContent.trim();
      container.textContent = container.dataset.mermaidSource;

      const highlight = pre.parentElement;
      if (highlight && highlight.classList.contains("highlight")) {
        highlight.replaceWith(container);
      } else {
        pre.replaceWith(container);
      }
    });
  }

  async function renderMermaid() {
    const nodes = document.querySelectorAll(".mermaid");
    if (!nodes.length || !mermaid) return;

    const isMobile = window.matchMedia("(max-width: 900px)").matches;

    nodes.forEach((node) => {
      if (node.dataset.mermaidSource) {
        let source = node.dataset.mermaidSource;
        
        // Pivot wide diagrams to vertical flow on mobile for legibility
        if (isMobile) {
          source = source.replace(/^(flowchart|graph)\s+LR/im, '$1 TD');
          source = source.replace(/^(flowchart|graph)\s+RL/im, '$1 BT');
        }
        
        node.textContent = source;
      }
      node.removeAttribute("data-processed");
    });

    mermaid.initialize({
      startOnLoad: false,
      securityLevel: "loose",
      theme: "base",
      flowchart: {
        useMaxWidth: true,
        htmlLabels: true,
        nodeSpacing: isMobile ? 40 : 80,
        rankSpacing: isMobile ? 60 : 100,
        padding: isMobile ? 12 : 20
      },
      themeVariables: buildThemeVariables()
    });

    await mermaid.run({ nodes });
  }


  // Click to Zoom feature
  function setupMermaidZoom() {
    let modal = document.querySelector('.mermaid-zoom-modal');
    if (!modal) {
      modal = document.createElement('div');
      modal.className = 'mermaid-zoom-modal';
      modal.innerHTML = `
        <button class="mermaid-zoom-close">&times;</button>
        <div class="mermaid-zoom-content"></div>
      `;
      document.body.appendChild(modal);

      modal.addEventListener('click', (e) => {
        if (e.target !== document.querySelector('.mermaid-zoom-content') && !e.target.closest('svg')) {
          modal.classList.remove('active');
        }
      });
      
      const content = modal.querySelector('.mermaid-zoom-content');
      let isDown = false;
      let startX, startY, scrollLeft, scrollTop;

      content.addEventListener('mousedown', (e) => {
        isDown = true;
        content.style.cursor = 'grabbing';
        startX = e.pageX - content.offsetLeft;
        startY = e.pageY - content.offsetTop;
        scrollLeft = content.scrollLeft;
        scrollTop = content.scrollTop;
      });
      content.addEventListener('mouseleave', () => { isDown = false; content.style.cursor = 'grab'; });
      content.addEventListener('mouseup', () => { isDown = false; content.style.cursor = 'grab'; });
      content.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - content.offsetLeft;
        const y = e.pageY - content.offsetTop;
        content.scrollLeft = scrollLeft - (x - startX);
        content.scrollTop = scrollTop - (y - startY);
      });
    }

    const modalContent = modal.querySelector('.mermaid-zoom-content');
    
    document.querySelectorAll('.blog-prose .mermaid').forEach(container => {
      // Remove old listeners to prevent duplicates
      const newContainer = container.cloneNode(true);
      container.parentNode.replaceChild(newContainer, container);
      
      newContainer.addEventListener('click', function() {
        const svg = this.querySelector('svg');
        if (svg) {
          modalContent.innerHTML = '';
          const clonedSvg = svg.cloneNode(true);
          // Remove max-width constraints for zooming
          clonedSvg.style.maxWidth = 'none';
          clonedSvg.style.width = '100%';
          clonedSvg.style.minWidth = window.innerWidth > 900 ? '1200px' : '800px'; 
          modalContent.appendChild(clonedSvg);
          modal.classList.add('active');
        }
      });
    });
  }

  setCodeLanguageBadges();
  enforceNewTabLinks();
  addLineNumbers();
  hydrateMermaidBlocks();
  renderMermaid().then(setupMermaidZoom);

  const observer = new MutationObserver((mutations) => {
    const changed = mutations.some(
      (m) => m.type === "attributes" && m.attributeName === "data-theme"
    );

    if (changed) {
      renderMermaid().then(setupMermaidZoom);
    }
  });

  observer.observe(html, { attributes: true });

  let resizeTimer;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      renderMermaid().then(setupMermaidZoom);
    }, 150);
  });
</script>
